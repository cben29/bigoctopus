<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarot Card Reading</title>
  <link href="https://fonts.googleapis.com/css2?family=Charm:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Classical Tarot Reading</h1>
      <p>Draw cards to reveal your fate...</p>
    </header>
    <main>
      <div class="tarot-deck">
        <button id="draw-card-btn">Draw a Card</button>
        <div id="card-display"></div>
      </div>
      <div id="reading">
        <h2>Your Reading:</h2>
        <p id="interpretation"></p>
      </div>
    </main>
    <footer>
      <p>© 2025 Classical Tarot</p>
    </footer>
  </div>
  <script src="script.js"></script>
</body>
</html>
